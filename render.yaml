services:
  - type: web
    name: nellfaa-backend
    env: python
    buildCommand: |
      pip install -r backend/requirements.txt
      python backend/manage.py collectstatic --noinput
    startCommand: gunicorn backend.nellfaa_backend.wsgi:application --log-file -
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
    plan: free
    region: oregon
    numInstances: 1
