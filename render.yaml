services:
  - type: web
    name: nellfaa-backend
    env: python
    buildCommand: |
      python -m pip install --upgrade pip
      pip install -r backend/requirements.txt
      python backend/manage.py collectstatic --noinput
    startCommand: gunicorn backend.nellfaa_backend.wsgi:application --log-file -
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: PYTHON_FULL_VERSION
        value: 3.10.13
      - key: PYTHON_RUNTIME
        value: python3.10
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
    plan: free
    region: oregon
    numInstances: 1
