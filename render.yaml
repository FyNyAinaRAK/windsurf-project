services:
  # Backend (Django)
  - type: web
    name: nellfaa-backend
    env: python
    buildCommand: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py migrate
      python manage.py collectstatic --noinput
    startCommand: gunicorn nellfaa_backend.wsgi:application --log-file -
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: DISABLE_COLLECTSTATIC
        value: 1
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DATABASE_URL
        fromDatabase:
          name: nellfaa-db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "nellfaa-backend.onrender.com"
    plan: free
    region: oregon
    numInstances: 1
    httpPort: 10000

  # Frontend (React)
  - type: web
    name: nellfaa-groupe
    env: node
    buildCommand: |
      cd frontend
      npm install
      npm run build
    staticPublishPath: "./frontend/build"
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: REACT_APP_API_URL
        value: https://nellfaa-backend.onrender.com
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    plan: free
    region: oregon

# Base de données PostgreSQL
databases:
  - name: nellfaa-db
    databaseName: nellfaa
    user: nellfaa_user
    plan: free
    region: oregon
